<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberBet — LIVE Хаб</title>
    <style>
        :root {
            --bg-main: #0b0c10; --bg-card: #1f2833; --text-light: #ffffff; --text-gray: #8b9bb4;
            --accent-neon: #a370f7; --accent-green: #00ffcc; --accent-gold: #ffd700; --accent-red: #ff4a4a;
            --border-glow: #2f3b50; --font: 'Segoe UI', Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-light); font-family: var(--font); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; padding: 10px 0; display: flex; flex-direction: column; gap: 5px; }
        header h1 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent-neon); }
        .user-block { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--accent-green); font-weight: bold; }
        
        .ticker-box { background: #151a22; border: 1px dashed var(--accent-neon); padding: 10px; text-align: center; border-radius: 8px; font-weight: bold; color: var(--accent-gold); display: none; }

        .card { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); position: relative; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-neon); }
        
        .live-match-box { background: linear-gradient(135deg, #151a22, #1f2833); border: 2px solid var(--accent-green); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 12px; padding: 20px; text-align: center; }
        .live-badge { background: var(--accent-red); color: white; font-weight: bold; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; display: inline-block; animation: blink 1.5s infinite; margin-bottom: 10px; }
        @keyframes blink { 50% { opacity: 0.4; } }
        .live-teams { display: flex; justify-content: space-around; align-items: center; margin: 15px 0; font-size: 1.2rem; font-weight: bold; gap: 10px; }
        .live-team-card { flex: 1; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid var(--border-glow); }
        .odds-display { font-size: 1.6rem; color: var(--accent-gold); margin-top: 8px; font-family: monospace; }
        
        .btn { border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; text-align: center; font-size: 0.85rem; transition: 0.2s; }
        .btn-green { background: var(--accent-green); color: #000; }
        .btn-green:hover { background: #00cc99; }
        .btn-red { background: var(--accent-red); color: #fff; }
        .btn-red:hover { background: #cc3333; }

        .bracket-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .match-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--border-glow); font-size: 0.95rem; }
        .match-status { font-size: 0.75rem; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .status-waiting { background: #3a4750; color: #ccc; }
        .status-live { background: var(--accent-green); color: #000; animation: blink 1.5s infinite; }
        .status-done { background: var(--accent-neon); color: #fff; }
        .match-score { font-family: monospace; font-weight: bold; color: var(--accent-gold); font-size: 1.1rem; }

        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .leaderboard-table th { color: var(--text-gray); font-size: 0.8rem; text-transform: uppercase; }
        .tier-badge { font-size: 0.7rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        
        .bets-monitor { margin-top: 15px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; text-align: left; border: 1px dashed var(--border-glow); }
        .bet-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bet-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="auth-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000;">
        <div style="background:var(--bg-card); border:2px solid var(--accent-neon); padding:30px; border-radius:16px; text-align:center; width:90%; max-width:350px;">
            <h2 style="color:var(--accent-green); margin-bottom:15px;">👋 ВХІД В ХАБ</h2>
            <select id="auth-user-select" style="width:100%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid var(--border-glow);"></select>
            <input type="password" id="auth-pin-input" placeholder="ПІН-код" style="width:100%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid var(--border-glow); text-align:center;">
            <button style="background:var(--accent-green); color:#000; border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer;" onclick="saveProfile()">УВІЙТИ</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>CyberBet — LIVE Хаб</h1>
            <div class="user-block" id="user-display-status">Завантаження профілю...</div>
        </header>

        <div class="ticker-box" id="announcement-ticker">📢 <span id="ticker-text">...</span></div>

        <div id="live-match-container" style="display: none;">
            <div class="live-match-box">
                <span class="live-badge" id="live-badge-status">🔴 LIVE МАТЧ — СТАВКИ ВІДКРИТО</span>
                <div style="color: var(--accent-gold); font-weight: bold; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 5px;">Мапа: <span id="live-map">-</span></div>
                
                <div class="live-teams">
                    <div class="live-team-card" style="border-left: 4px solid var(--accent-green);">
                        <div id="live-t1-name">-</div>
                        <div class="odds-display" id="live-t1-odds">x1.00</div>
                    </div>
                    <div style="font-size: 1.3rem; color: var(--text-gray);">VS</div>
                    <div class="live-team-card" style="border-right: 4px solid var(--accent-red);">
                        <div id="live-t2-name">-</div>
                        <div class="odds-display" id="live-t2-odds">x1.00</div>
                    </div>
                </div>
                
                <div id="betting-form-zone" style="margin-top: 15px; border-top: 1px solid var(--border-glow); padding-top: 15px;"></div>
                
                <div class="bets-monitor">
                    <div style="font-weight:bold; color:var(--accent-gold); font-size:0.9rem; text-align:center; margin-bottom:8px; text-transform:uppercase;">📊 Всі ставки пацанів на цей матч:</div>
                    <div id="public-bets-list">Ставок немає. Спробуй поставити першим!</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📋 Розклад та статус матчів (<span id="bracket-type-title">Завантаження...</span>)</h2>
            <div class="bracket-grid" id="bracket-matches-box"></div>
        </div>

        <div class="card">
            <h2>🏆 Рейтинг пацанів (LIVE Баланс)</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Гравець</th>
                        <th style="text-align: right;">Баланс</th>
                    </tr>
                </thead>
                <tbody id="pts-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://admin67abemo-default-rtdb.europe-west1.firebasedatabase.app';
        let myPlayerId = localStorage.getItem('cyberbet_player_id');
        let lastBetZoneState = ""; // Захист від стирання інпуту

        const playerTiers = {
            "oleksandr": { label: "Tier-S Фаворит", color: "#ffd700" },
            "makaron": { label: "Tier-A Топ-2", color: "#a370f7" },
            "valik": { label: "Tier-A Топ-2", color: "#a370f7" },
            "zinko": { label: "Tier-B Спец", color: "#00ffcc" },
            "misko": { label: "Tier-B Гуд", color: "#00ffcc" },
            "kolya": { label: "Tier-C Рандом", color: "#ff6b00" },
            "bodya": { label: "Tier-C Рандом", color: "#ff6b00" },
            "dzhogolyk": { label: "Tier-D Нуб", color: "#ff4a4a" }
        };

        function saveProfile() {
            const selected = document.getElementById('auth-user-select').value;
            const pin = document.getElementById('auth-pin-input').value.trim();
            fetch(`${BASE_URL}/players/${selected}.json`).then(res => res.json()).then(p => {
                if(p && p.pin === pin) {
                    localStorage.setItem('cyberbet_player_id', selected); location.reload();
                } else { alert("Невірний ПІН!"); }
            }).catch(() => alert("Помилка авторизації. Перевір базу."));
        }

        function placeBet(teamKey) {
            const amountInput = document.getElementById('bet-amount-input');
            if(!amountInput) return;
            const amount = parseInt(amountInput.value);
            if (!amount || amount <= 0) { alert("Введіть нормальну суму PTS!"); return; }

            fetch(`${BASE_URL}/.json`).then(res => res.json()).then(data => {
                if (!data || !data.active_match || !data.active_match.active) { alert("Немає активного матчу!"); return; }
                if (data.active_match.bets_closed) { alert("⛔ Саня вже закрив ставки на цей матч!"); return; }
                
                const player = data.players[myPlayerId];
                if (!player) { alert("Тебе не знайдено в базі!"); return; }
                if (amount > player.current) { alert("У тебе немає стільки PTS!"); return; }
                if (data.active_match.bets && data.active_match.bets[myPlayerId]) { alert("Ти вже поставив на цю катку!"); return; }

                const odds = teamKey === 'team1' ? data.active_match.team1_odds : data.active_match.team2_odds;
                const teamName = teamKey === 'team1' ? data.active_match.team1 : data.active_match.team2;

                const betData = { team: teamKey, teamName: teamName, amount: amount, odds: odds };
                const newBalance = player.current - amount;

                Promise.all([
                    fetch(`${BASE_URL}/active_match/bets/${myPlayerId}.json`, { method: 'PUT', body: JSON.stringify(betData) }),
                    fetch(`${BASE_URL}/players/${myPlayerId}/current.json`, { method: 'PUT', body: JSON.stringify(newBalance) })
                ]).then(() => {
                    alert(`🔥 Прийнято! ${amount} PTS на "${teamName}"`);
                    lastBetZoneState = ""; // Скидаємо стан для негайного перерендеру
                    updateHubView();
                });
            }).catch(() => alert("Помилка з'єднання з базою при спробі поставити."));
        }

        function updateHubView() {
            fetch(`${BASE_URL}/.json`).then(res => res.json()).then(data => {
                if(!data) return;

                if(myPlayerId && data.players && !data.players[myPlayerId]) {
                    localStorage.removeItem('cyberbet_player_id'); myPlayerId = null; location.reload(); return;
                }

                if(!myPlayerId) {
                    const select = document.getElementById('auth-user-select');
                    if(select.options.length === 0 && data.players) {
                        Object.keys(data.players).forEach(k => select.innerHTML += `<option value="${k}">${data.players[k].name}</option>`);
                    }
                    document.getElementById('auth-modal').style.display = 'flex'; return;
                }
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('user-display-status').textContent = `Мій акаунт: ${data.players[myPlayerId]?.name || myPlayerId}`;

                if(data.announcement && data.announcement.trim() !== "") {
                    document.getElementById('announcement-ticker').style.display = 'block';
                    document.getElementById('ticker-text').textContent = data.announcement;
                } else { document.getElementById('announcement-ticker').style.display = 'none'; }

                // ОБРОБКА LIVE МАТЧУ
                if(data.active_match && data.active_match.active) {
                    document.getElementById('live-match-container').style.display = 'block';
                    document.getElementById('live-map').textContent = data.active_match.map || 'Не вказана';
                    document.getElementById('live-t1-name').textContent = data.active_match.team1 || 'Команда 1';
                    document.getElementById('live-t2-name').textContent = data.active_match.team2 || 'Команда 2';
                    document.getElementById('live-t1-odds').textContent = `x${data.active_match.team1_odds || '1.00'}`;
                    document.getElementById('live-t2-odds').textContent = `x${data.active_match.team2_odds || '1.00'}`;

                    const betZone = document.getElementById('betting-form-zone');
                    const myBet = data.active_match.bets ? data.active_match.bets[myPlayerId] : null;
                    const isClosed = data.active_match.bets_closed || false;

                    if (isClosed) {
                        document.getElementById('live-badge-status').textContent = "🔒 СТАВКИ ЗАКРИТО (ЙДЕ ГРА)";
                        document.getElementById('live-badge-status').style.background = "#555";
                    } else {
                        document.getElementById('live-badge-status').textContent = "🔴 LIVE МАТЧ — СТАВКИ ВІДКРИТО";
                        document.getElementById('live-badge-status').style.background = "var(--accent-red)";
                    }

                    // Визначаємо поточний стан форми
                    let currentCalculatedState = "form";
                    if (myBet) currentCalculatedState = "voted";
                    else if (isClosed) currentCalculatedState = "closed";

                    // Перемальовуємо HTML ТІЛЬКИ якщо стан реально змінився!
                    if (lastBetZoneState !== currentCalculatedState) {
                        lastBetZoneState = currentCalculatedState;
                        
                        if(currentCalculatedState === "voted") {
                            betZone.innerHTML = `<div style="color:var(--accent-green); font-weight:bold; font-size:1.1rem; padding:5px 0;">✅ Твоя ставка прийнята: ${myBet.amount} PTS на "${myBet.teamName}" (Кеф x${myBet.odds})</div>`;
                        } else if (currentCalculatedState === "closed") {
                            betZone.innerHTML = `<div style="color:var(--accent-red); font-weight:bold; font-size:1rem; padding: 10px; border: 1px dashed var(--accent-red); border-radius:6px; background:rgba(255,74,74,0.05);">🔒 Ставки на цю гру закриті адміном! Очікуй результатів.</div>`;
                        } else {
                            betZone.innerHTML = `
                                <div style="display:flex; flex-direction:column; gap:10px; align-items:center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px;">
                                    <div style="font-size:0.95rem; color:var(--text-gray);">Твій доступний баланс: <span id="live-my-balance-text" style="color:var(--accent-green); font-weight:bold;">... PTS</span></div>
                                    <input type="number" id="bet-amount-input" placeholder="Сума ставки PTS..." style="background:#000; color:#fff; border:1px solid var(--border-glow); padding:10px; text-align:center; border-radius:6px; width:180px; font-weight:bold; font-size:1rem;">
                                    <div style="display:flex; gap:10px; width:100%; max-width:440px;">
                                        <button class="btn btn-green" style="flex:1;" onclick="placeBet('team1')">Ставка на Т1</button>
                                        <button class="btn btn-red" style="flex:1;" onclick="placeBet('team2')">Ставка на Т2</button>
                                    </div>
                                </div>
                            `;
                        }
                    }

                    // Оновлюємо виключно текстову цифру балансу, не чіпаючи інпут
                    if (currentCalculatedState === "form") {
                        const myPts = data.players[myPlayerId]?.current || 0;
                        const balText = document.getElementById('live-my-balance-text');
                        if (balText) balText.textContent = `${myPts} PTS`;
                    }

                    // ОНОВЛЕННЯ ПУБЛІЧНОГО СПИСКУ СТАВОК
                    const publicBetsBox = document.getElementById('public-bets-list');
                    if(data.active_match.bets && Object.keys(data.active_match.bets).length > 0) {
                        let betsHtml = '';
                        Object.keys(data.active_match.bets).forEach(pId => {
                            const pName = data.players[pId]?.name || pId;
                            const b = data.active_match.bets[pId];
                            const teamColor = b.team === 'team1' ? 'var(--accent-green)' : 'var(--accent-red)';
                            betsHtml += `
                                <div class="bet-row">
                                    <span>👤 <b>${pName}</b></span>
                                    <span>👉 на <span style="color:${teamColor}; font-weight:bold;">${b.teamName}</span> | <b>${b.amount} PTS</b> (x${b.odds})</span>
                                </div>`;
                        });
                        publicBetsBox.innerHTML = betsHtml;
                    } else {
                        publicBetsBox.innerHTML = `<div style="text-align:center; color:var(--text-gray); font-size:0.85rem; padding:5px 0;">Ставок на цю катку ще ніхто не зробив.</div>`;
                    }

                } else { 
                    document.getElementById('live-match-container').style.display = 'none'; 
                    lastBetZoneState = "";
                }

                // СІТКА ТУРНІРУ
                if(data.bracket) {
                    document.getElementById('bracket-type-title').textContent = data.bracket.type === '7players' ? '7 гравців' : '8 гравців з Міськом';
                    const box = document.getElementById('bracket-matches-box'); box.innerHTML = '';
                    if(data.bracket.matches) {
                        data.bracket.matches.forEach(m => {
                            let statusClass = 'status-waiting', statusText = 'Очікує';
                            if(m.status === 'live') { statusClass = 'status-live'; statusText = 'ГРАЄТЬСЯ'; }
                            if(m.status === 'done') { statusClass = 'status-done'; statusText = 'ЗАВЕРШЕНО'; }
                            box.innerHTML += `
                                <div class="match-row">
                                    <div style="display:flex; flex-direction:column; gap:3px;">
                                        <span style="font-size:0.75rem; color:var(--text-gray); font-weight:bold;">${m.stage}</span>
                                        <span><b>${m.t1}</b> vs <b>${m.t2}</b></span>
                                    </div>
                                    <div style="display:flex; align-items:center; gap:15px;">
                                        <span class="match-score">${m.score || '0 : 0'}</span>
                                        <span class="match-status ${statusClass}">${statusText}</span>
                                    </div>
                                </div>`;
                        });
                    }
                }

                // РЕЙТИНГ ПАЦАНІВ
                if(data.players) {
                    const tbody = document.getElementById('pts-body'); tbody.innerHTML = '';
                    const sortedPlayers = Object.keys(data.players).map(k => {
                        return { id: k, ...data.players[k] };
                    }).sort((a,b) => b.current - a.current);

                    sortedPlayers.forEach((p, i) => {
                        const tier = playerTiers[p.id] || { label: "Tier-C Рандом", color: "#ccc" };
                        tbody
