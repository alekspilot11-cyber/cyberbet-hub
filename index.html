<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberBet — LIVE Hub v4.5</title>
    <style>
        :root {
            --bg-main: #0b0c10; --bg-card: #1f2833; --text-light: #ffffff; --text-gray: #8b9bb4;
            --accent-neon: #a370f7; --accent-green: #00ffcc; --accent-gold: #ffd700; --accent-red: #ff4a4a;
            --border-glow: #2f3b50; --font: 'Segoe UI', Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-light); font-family: var(--font); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; padding: 10px 0; display: flex; flex-direction: column; gap: 5px; }
        header h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent-neon); }
        .user-block { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 0.9rem; }
        .user-status { color: var(--accent-green); font-weight: bold; }
        
        .tabs-nav { display: flex; gap: 8px; border-bottom: 2px solid var(--border-glow); margin-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-gray); padding: 12px 16px; font-size: 0.95rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent-green); border-bottom: 3px solid var(--accent-green); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); position: relative; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-neon); }
        
        /* БЛОК LIVE СТАВОК */
        .live-match-box { background: linear-gradient(135deg, #151a22, #1f2833); border: 2px solid var(--accent-green); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .live-badge { background: var(--accent-red); color: white; font-weight: bold; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; display: inline-block; animation: blink 1.5s infinite; margin-bottom: 10px; }
        @keyframes blink { 50% { opacity: 0.4; } }
        .live-teams { display: flex; justify-content: space-around; align-items: center; margin: 15px 0; font-size: 1.2rem; font-weight: bold; gap: 10px; }
        .live-team-card { flex: 1; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid var(--border-glow); }
        .odds-display { font-size: 1.6rem; color: var(--accent-gold); margin-top: 8px; font-family: monospace; }
        
        /* Таблиця */
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .leaderboard-table th { color: var(--text-gray); font-size: 0.8rem; text-transform: uppercase; }
        .rank { font-weight: bold; width: 40px; }
    </style>
</head>
<body>

    <div id="auth-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:1000;">
        <div style="background:var(--bg-card); border:2px solid var(--accent-neon); padding:30px; border-radius:16px; text-align:center; width:90%; max-width:350px;">
            <h2 style="color:var(--accent-green); margin-bottom:15px;">👋 ВХІД В ХАБ</h2>
            <select id="auth-user-select" style="width:100%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid var(--border-glow);"></select>
            <input type="password" id="auth-pin-input" placeholder="ПІН-код" style="width:100%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid var(--border-glow); text-align:center;">
            <button style="background:var(--accent-green); color:#000; border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer;" onclick="saveProfile()">УВІЙТИ</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>CyberBet — LIVE Hub v4.5</h1>
            <div class="user-block">
                <div class="user-status" id="user-display-status">Завантаження...</div>
                <button id="btn-logout" style="background:none; border:none; color:var(--accent-red); cursor:pointer; font-weight:bold; display:none;" onclick="logout()">[Вийти]</button>
            </div>
        </header>

        <!-- LIVE МАТЧ СТАВКИ -->
        <div id="live-match-container" style="display: none;">
            <div class="live-match-box">
                <span class="live-badge">🔴 LIVE МАТЧ ПРЯМО ЗАРАЗ</span>
                <div style="color: var(--accent-gold); font-weight: bold; text-transform: uppercase; font-size: 0.9rem;">Мапа: <span id="live-map">-</span></div>
                <div class="live-teams">
                    <div class="live-team-card" style="border-left: 4px solid var(--accent-green);">
                        <div id="live-t1-name" style="color: #fff;">Тіма 1</div>
                        <div class="odds-display" id="live-t1-odds">1.00</div>
                    </div>
                    <div style="font-size: 1.5rem; color: var(--text-gray);">VS</div>
                    <div class="live-team-card" style="border-right: 4px solid var(--accent-red);">
                        <div id="live-t2-name" style="color: #fff;">Тіма 2</div>
                        <div class="odds-display" id="live-t2-odds">1.00</div>
                    </div>
                </div>
                <p style="color: var(--text-gray); font-size: 0.85rem;">🔥 Для ставки напиши овнеру в ТГ: команду та скільки PTS ставиш!</p>
            </div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active">🏆 Статистика турніру</button>
        </div>

        <div id="leaderboard" class="tab-content active card">
            <h2 style="margin-bottom: 15px; font-size: 1.1rem;">📊 Рейтинг пацанів (LIVE Баланс)</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th class="rank">#</th>
                        <th>Гравець</th>
                        <th>K / D</th>
                        <th>Вінстрік</th>
                        <th style="text-align: right;">Баланс</th>
                    </tr>
                </thead>
                <tbody id="pts-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://admin67abemo-default-rtdb.europe-west1.firebasedatabase.app';
        let myPlayerId = localStorage.getItem('cyberbet_player_id');

        function saveProfile() {
            const selected = document.getElementById('auth-user-select').value;
            const pin = document.getElementById('auth-pin-input').value.trim();
            fetch(`${BASE_URL}/players/${selected}.json`).then(res => res.json()).then(p => {
                if(p && p.pin === pin) {
                    localStorage.setItem('cyberbet_player_id', selected);
                    location.reload();
                } else { alert("Невірний ПІН!"); }
            });
        }
        function logout() { localStorage.clear(); location.reload(); }

        function initHub() {
            fetch(`${BASE_URL}/.json`).then(res => res.json()).then(root => {
                if(!root) return;
                
                // Селект для входу
                const select = document.getElementById('auth-user-select');
                if(select.options.length === 0 && root.players) {
                    Object.keys(root.players).forEach(k => {
                        select.innerHTML += `<option value="${k}">${root.players[k].name}</option>`;
                    });
                }

                if(!myPlayerId) { document.getElementById('auth-modal').style.display = 'flex'; return; }
                document.getElementById('user-display-status').textContent = `Мій профіль: ${myPlayerId.toUpperCase()}`;
                document.getElementById('btn-logout').style.display = 'inline';

                // Рендер LIVE матчу
                if(root.active_match && root.active_match.active) {
                    document.getElementById('live-match-container').style.display = 'block';
                    document.getElementById('live-map').textContent = root.active_match.map;
                    document.getElementById('live-t1-name').textContent = root.active_match.team1;
                    document.getElementById('live-t2-name').textContent = root.active_match.team2;
                    document.getElementById('live-t1-odds').textContent = `x${root.active_match.team1_odds}`;
                    document.getElementById('live-t2-odds').textContent = `x${root.active_match.team2_odds}`;
                } else {
                    document.getElementById('live-match-container').style.display = 'none';
                }

                // Рендер таблиці лідерів
                if(root.players) {
                    const tbody = document.getElementById('pts-body'); tbody.innerHTML = '';
                    let arr = Object.keys(root.players).map(k => root.players[k]).sort((a,b) => b.current - a.current);
                    arr.forEach((p, idx) => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="rank">${idx+1}</td>
                                <td><b>${p.name}</b><br><span style="font-size:0.75rem; color:var(--text-gray)">@${p.username}</span></td>
                                <td style="font-family:monospace;">${p.total_kills}/${p.total_deaths}</td>
                                <td style="color:#ff6b00">${p.win_streak > 0 ? '🔥 '+p.win_streak : '0'}</td>
                                <td style="text-align:right; font-weight:bold; color:var(--accent-green)">${p.current} PTS</td>
                            </tr>
                        `;
                    });
                }
            });
        }
        initHub(); setInterval(initHub, 3000);
    </script>
</body>
</html>
